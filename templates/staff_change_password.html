{% include 'staff_header.html'%}
<style>
  #image {
    display: none;
  }
</style>
<script>
  function matchPassword1() {
    var pw1 = document.getElementById("pass").value;
    var pw2 = document.getElementById("c_pass").value;
    const image = document.getElementById("image");
    if (((pw1 == "") && (pw2 == "")) || ((pw1 != "") && (pw2 == ""))) {
      document.getElementById("image").style.display = "none";
      return false;
    }
    else if ((pw1 != pw2) || (pw1 == "") && (pw2 != "")) {
      image.src = "static/assets/img/r.png"
      document.getElementById("image").style.display = "block";
      return false;
    } else {
      const image = document.getElementById("image");
      image.src = "static/assets/img/g.png"
      document.getElementById("image").style.display = "block";
      return false;
    }
  }
  function matchPassword2() {
    var pw1 = document.getElementById("pass").value;
    var pw2 = document.getElementById("c_pass").value;
    const image = document.getElementById("image");
    if ((pw1 == "") && (pw2 == "")) {
      document.getElementById("image").style.display = "none";
      return false;
    }
    else if ((pw1 != pw2) || (pw1 != "") && (pw2 == "") || (pw1 == "") && (pw2 != "")) {
      image.src = "static/assets/img/r.png"
      document.getElementById("image").style.display = "block";
      return false;
    } else {
      const image = document.getElementById("image");
      image.src = "static/assets/img/g.png"
      document.getElementById("image").style.display = "block";
      return false;
    }
  } 
</script>

<!-- ======= Breadcrumbs ======= -->
<div class="profile">
  <div class="breadcrumbs d-flex align-items-center" style="background-color: #1b2f45">
  </div><!-- End Breadcrumbs -->
  <div>

    <main id="main">


      <!-- ======= Section-2 ======= -->
      <section id="contact" class="contactt">
        <div class="container position-relative d-flex flex-column ">
          <div class="row">
            <div>
              <br>

              <h1 style="color: #06567b; font-weight: 600; font-size: 45px;">Change Password </h1>
              <br>
              <form action="" method="post" class="php-email-form">
                <table style="width: 80%; " cellpadding="6">
                  <tr>
                    <th style="width: 20%;">Current Password</th>
                    <td style="width: 40%;"><input type="password" name="old_password" class="form-control mt-3"
                        required></td>
                  </tr>
                  <tr>
                    <th>New Password</th>
                    <td><input type="password" id="pass" name="new_password" oncopy="return false"
                        onpaste="return false" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                        title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters"
                        class="form-control mt-3" onkeyup="matchPassword1()" required></td>
                    <td></td>
                  </tr>
                  <tr>
                    <th>Confirm New Password</th>
                    <td><input type="password" id="c_pass" name="con_password" oncopy="return false"
                        onpaste="return false" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                        title="Must match with new password" class="form-control mt-3" onkeyup="matchPassword2()"
                        required>
                    </td>
                    <td><img src="" class="mt-3" id="image" style="height: 0.8cm; width: 0.8cm;"></td>
                  </tr>
                  <tr>
                    <td colspan="2" style="text-align: right;"><input type="submit" name="submit" class="mt-3"
                        value="Submit">
                    </td>
                  </tr>
                </table>

              </form>
              <br><br><br>
            </div>
          </div>
        </div>
      </section><!-- End Section-2 -->
    </main>
