{%include 'public_header.html'%}

<main id="main">
  <!-- ======= Breadcrumbs ======= -->
  <div class="breadcrumbs d-flex align-items-center" style="background-image: url('static/assets/img/login.png');">
    <div class="container position-relative d-flex flex-column align-items-center">
      <h2>Login</h2>
    </div>
  </div><!-- End Breadcrumbs -->

  <!-- ======= Section-2 ======= -->
  <section id="contact" class="contact">
    <div class="container position-relative d-flex flex-column align-items-center">
      <div>
        <br>
        <div data-aos="fade-up" data-aos-delay="100">
          <form method="post" class="php-email-form ">
            <table cellpadding="6" style="width: 350px;">
              <tr>
                <td><input type="text" name="username" placeholder="Username" class="form-control" required></td>
              </tr>
              <tr>
                <div id="pro">
                  <td><input type="password" id="id_password" name="password" placeholder="Password"
                      class=" form-control mt-3" required></td>
                  <td>
                    <div class="mt-3"><i class="bi bi-eye-slash-fill" id="togglePassword"
                        style=" margin-left: -40px;  cursor: pointer;"></i></div>
                  </td>
                </div>
              </tr>
              <tr>
                <td colspan="2" style="text-align: center;"><input type="submit" name="submit" value="Login"
                    class="mt-3">
                </td>
              </tr>
            </table>
          </form>
        </div>
      </div>
    </div>
    <br><br><br>
  </section><!-- End Section-2 -->
</main>

{% include 'footer.html'%}
