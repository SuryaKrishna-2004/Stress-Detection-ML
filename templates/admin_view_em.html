        $(function() {
            $("#monthYearInput").datepicker({
                dateFormat: 'MM yy',
                changeMonth: true,
                changeYear: true,
                showButtonPanel: true,
                onClose: function(dateText, inst) {
                    var month = $("#ui-datepicker-div .ui-datepicker-month :selected").val();
                    var year = $("#ui-datepicker-div .ui-datepicker-year :selected").val();
                    $(this).datepicker('setDate', new Date(year, month, 1));
                }
            });
        });
    </script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    var ctx = document.getElementById("emotionChart").getContext("2d");

    var dates = [];
    var staffData = {};

    {% for i in data['em']%}
      dates.push("{{ i['date'] }}");
      
      if (!staffData["{{ i['staff_id'] }}"]) {
        staffData["{{ i['staff_id'] }}"] = {
          label: "{{ i['first_name'] }} {{ i['last_name'] }}",
          data: [],
          emotion: [],  // Add this line
          borderColor: getRandomColor(),
          borderWidth: 2,
          fill: false,
        };
      }

      staffData["{{ i['staff_id'] }}"].data.push({{ i['average_score'] }});
      staffData["{{ i['staff_id'] }}"].emotion.push("{{ i['detected_emotion'] }}");
    {% endfor %}



    {% for i in data['din']%}
      dates.push("{{ i['date'] }}");
      
      if (!staffData["{{ i['staff_id'] }}"]) {
        staffData["{{ i['staff_id'] }}"] = {
          label: "{{ i['first_name'] }} {{ i['last_name'] }}",
          data: [],
          emotion: [],  // Add this line
          borderColor: getRandomColor(),
          borderWidth: 2,
          fill: false,
        };
      }

      staffData["{{ i['staff_id'] }}"].data.push({{ i['average_score'] }});
      staffData["{{ i['staff_id'] }}"].emotion.push("{{ i['detected_emotion'] }}");
    {% endfor %}


    {% for i in data['min']%}
      dates.push("{{ i['date'] }}");
      
      if (!staffData["{{ i['staff_id'] }}"]) {
        staffData["{{ i['staff_id'] }}"] = {
          label: "{{ i['first_name'] }} {{ i['last_name'] }}",
          data: [],
          emotion: [],  // Add this line
          borderColor: getRandomColor(),
          borderWidth: 2,
          fill: false,
        };
      }

      staffData["{{ i['staff_id'] }}"].data.push({{ i['average_score'] }});
      staffData["{{ i['staff_id'] }}"].emotion.push("{{ i['detected_emotion'] }}");
    {% endfor %}


    var datasets = Object.values(staffData).map(function (staff) {
      return {
        label: staff.label,
        data: staff.data,
        borderColor: staff.borderColor,
        borderWidth: staff.borderWidth,
        fill: staff.fill,
      };
    });

    var myChart = new Chart(ctx, {
      type: "bar",
      data: {
        labels: dates,
        datasets: datasets,
      },
      options: {
        scales: {
          x: {
            type: "category",
            labels: dates,
          },
          y: {
            beginAtZero: true,
            max: 7, // Adjust this to the maximum emotion score value
          },
        },
        plugins: {
          tooltip: {
            callbacks: {
              title: function (tooltipItem) {
                return tooltipItem[0].label;
              },
              label: function (context) {
                var datasetIndex = context.datasetIndex;
                var index = context.dataIndex;
                var staff = staffData[Object.keys(staffData)[datasetIndex]];
                return `${staff.label}: ${staff.emotion[index]}`;
              },
            },
          },
        },
      },
    });
  });

  function getRandomColor() {
    var letters = "0123456789ABCDEF";
    var color = "#";
    for (var i = 0; i < 6; i++) {
      color += letters[Math.floor(Math.random() * 16)];
    }
    return color;
  }
</script>


<style>
  canvas#emotionChart {
    max-width: 100%;
    margin: 0 auto;

    background-color: #fff;

    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
  }

  /* Tooltip styles */
  .chartjs-tooltip {
    background: rgba(255, 255, 255, 0.8);
    border: 1px solid #ddd;
    padding: 10px;
    color: #555;
    border-radius: 4px;
    box-shadow: 0 0 8px rgba(0, 0, 0, 0.1);
  }

  /* Responsive styles */
  @media (max-width: 768px) {
    canvas#emotionChart {
      border: none;
      box-shadow: none;
    }

    .chartjs-tooltip {
      box-shadow: none;
    }
  }
</style>
