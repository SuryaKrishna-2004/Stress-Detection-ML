<!-- ======= Section-2 ======= -->
<section id="contact" class="contactt">
  <div class="container position-relative d-flex flex-column ">
    <div class="row">
      <div>

        <h1 style="color: #06567b;" class="mt-3">Your Responds</h1>
        <form action="" method="post" class="php-email-form">
          <table style="width: 500px; " cellpadding="6">
            <tr>
              <th>Complaint</th>
            </tr>
            {%for i in data['view']%}
            <tr>
              <td>{{i['complaint_des']}}</td>
            </tr>
            {%endfor%}
            <tr>
              <th>Solution</th>
            </tr>
            <tr>
              <td><textarea name="reply" placeholder="Lets solve it..." class="form-control" cols="100"
                  rows="10"></textarea></td>
            </tr>
            <tr>
              <td><input type="submit" name='submit' class="mt-3" value="SEND"></td>
            </tr>
          </table>
        </form>

      </div>
    </div>
  </div>
</section><!-- End Section-2 -->
